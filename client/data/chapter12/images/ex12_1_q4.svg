<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320" style="background-color:white; border:1px solid #ddd;">
  <defs>
    <!-- Arrowhead markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="black"/>
    </marker>
    <!-- Sphere Radial Gradient for 3D look -->
    <radialGradient id="hemiGrad" cx="50%" cy="30%" r="50%" fx="40%" fy="20%">
      <stop offset="0%" stop-color="#90caf9" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#1e88e5" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0d47a1" stop-opacity="0.95"/>
    </radialGradient>
  </defs>

  <!-- 3D Cube Faces -->
  <!-- Top face -->
  <path d="M 80 130 L 135 80 L 275 80 L 220 130 Z" fill="#0062b0" stroke="black" stroke-width="1.5"/>
  <!-- Right face -->
  <path d="M 220 130 L 275 80 L 275 210 L 220 260 Z" fill="#00508f" stroke="black" stroke-width="1.5"/>
  <!-- Front face -->
  <path d="M 80 130 L 220 130 L 220 260 L 80 260 Z" fill="#007ad9" stroke="black" stroke-width="1.5"/>

  <!-- Hemisphere Base Ellipse -->
  <ellipse cx="177.5" cy="105" rx="65" ry="22" fill="none" stroke="black" stroke-width="1.5"/>

  <!-- Hemisphere Dome -->
  <path d="M 112.5 105 A 65 65 0 0 1 242.5 105 Z" fill="url(#hemiGrad)" stroke="black" stroke-width="1.5"/>
  
  <!-- Re-draw front half of ellipse outline on top of dome for depth -->
  <ellipse cx="177.5" cy="105" rx="65" ry="22" fill="none" stroke="black" stroke-width="1.5"/>

  <!-- Dimension Helper / Extension lines -->
  <!-- Height helpers -->
  <line x1="75" y1="130" x2="50" y2="130" stroke="black" stroke-width="1" stroke-dasharray="2"/>
  <line x1="75" y1="260" x2="50" y2="260" stroke="black" stroke-width="1" stroke-dasharray="2"/>
  <!-- Width helpers -->
  <line x1="80" y1="265" x2="80" y2="280" stroke="black" stroke-width="1" stroke-dasharray="2"/>
  <line x1="220" y1="265" x2="220" y2="280" stroke="black" stroke-width="1" stroke-dasharray="2"/>

  <!-- Left Arrow (Vertical Height: 7 cm) -->
  <line x1="55" y1="136" x2="55" y2="254" stroke="black" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="35" y="200" font-family="Arial" font-size="13" font-weight="bold" fill="black" text-anchor="middle">7 cm</text>

  <!-- Bottom Arrow (Horizontal Width: 7 cm) -->
  <line x1="86" y1="275" x2="214" y2="275" stroke="black" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="150" y="295" font-family="Arial" font-size="13" font-weight="bold" fill="black" text-anchor="middle">7 cm</text>

  <!-- Depth Arrow (Side Edge: 7 cm) -->
  <line x1="232" y1="137" x2="279" y2="95" stroke="black" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="278" y="130" font-family="Arial" font-size="13" font-weight="bold" fill="black" text-anchor="middle">7 cm</text>

  <!-- Diameter Arrow (Hemisphere: 7 cm) -->
  <line x1="118.5" y1="105" x2="236.5" y2="105" stroke="black" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="177.5" y="93" font-family="Arial" font-size="13" font-weight="bold" fill="black" text-anchor="middle">7 cm</text>
</svg>