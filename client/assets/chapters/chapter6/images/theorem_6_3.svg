<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="200" height="150" style="background-color:white; border:1px solid #ddd;">
  <!-- Triangle ABC (Small) -->
  <polygon points="40,20 20,60 60,60" fill="none" stroke="red" stroke-width="2"/>
  <text x="35" y="15" font-family="Arial" font-size="10" fill="red">A</text>
  <text x="10" y="70" font-family="Arial" font-size="10" fill="red">B</text>
  <text x="65" y="70" font-family="Arial" font-size="10" fill="red">C</text>
  
  <!-- Triangle DEF (Large) with cut PQ -->
  <polygon points="140,20 100,100 180,100" fill="none" stroke="red" stroke-width="2"/>
  <line x1="120" y1="60" x2="160" y2="60" stroke="red" stroke-dasharray="4" stroke-width="2"/>
  <text x="135" y="15" font-family="Arial" font-size="10" fill="red">D</text>
  <text x="90" y="110" font-family="Arial" font-size="10" fill="red">E</text>
  <text x="185" y="110" font-family="Arial" font-size="10" fill="red">F</text>
  <text x="110" y="60" font-family="Arial" font-size="10" fill="red">P</text>
  <text x="165" y="60" font-family="Arial" font-size="10" fill="red">Q</text>

<style> text, tspan { fill: red !important; } </style>




</svg>